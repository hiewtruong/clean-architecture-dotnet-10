services:
  catalogdb:
    container_name: catalogdb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
  
  basketdb:
    container_name: basketdb
    restart: always
    ports:
      - "6379:6379"  
   
  discountdb:
    container_name: discountdb
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=Password@1
      - POSTGRES_DB=DiscountDb
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  orderdb:
    container_name: orderdb
    environment:
      SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    restart: always
    ports:
      - "1433:1433"
    volumes:
      - orderdb-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'StrongPassword123!' -Q 'select 1'"]
      interval: 10s
      timeout: 10s
      retries: 3

  identitydb:
    container_name: identitydb
    environment:
      SA_PASSWORD: "StrongPassword123!"
      ACCEPT_EULA: "Y"
    restart: always
    ports:
      - "1434:1433"
    volumes:
      - identitydb-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'StrongPassword123!' -Q 'select 1'"]
      interval: 10s
      timeout: 10s
      retries: 3   

  rabbitmq:
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  catalog:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - "DatabaseSettings__ConnectionString=mongodb://catalogdb:27017"
      - "DatabaseSettings__DatabaseName=CatalogDb"
      - "DatabaseSettings__ProductCollectionName=Products"
      - "DatabaseSettings__BrandCollectionName=Brands"
      - "DatabaseSettings__TypeCollectionName=Types"
      - "ElasticConfiguration__Uri=http://elasticsearch:9200"  
    depends_on:
      - catalogdb          
    ports:
      - "8000:8080"  
  basket:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - "CacheSettings__ConnectionString=basketdb:6379" 
      - "GrpcSettings__DiscountUrl=http://discount:8080" 
      - "EventBusSettings__HostAddress=amqp://guest:guest@rabbitmq:5672/"
      - "ElasticConfiguration__Uri=http://elasticsearch:9200" 
    depends_on:
      - basketdb
      - rabbitmq
    ports:
      - "8001:8080"

  discount:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - "DatabaseSettings__ConnectionString=Server=discountdb;Port=5432;Database=DiscountDb;User Id=admin;Password=Password@1;"  
      - "ElasticConfiguration__Uri=http://elasticsearch:9200"  
    depends_on:
      discountdb:
        condition: service_healthy          
    ports:
      - "8002:8080"

  ordering:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - "ConnectionStrings__OrderingConnectionString=Server=orderdb;Database=OrderDb;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True;Encrypt=True;"     
      - "EventBusSettings__HostAddress=amqp://guest:guest@rabbitmq:5672/"
      - "ElasticConfiguration__Uri=http://elasticsearch:9200"  
    depends_on:
      - orderdb
      - rabbitmq 
    ports:
      - "8003:8080" 

  payment:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - "EventBusSettings__HostAddress=amqp://guest:guest@rabbitmq:5672/"  
      - "ElasticConfiguration__Uri=http://elasticsearch:9200"  
    ports:
      - "8004:8080"  

  
  identity:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - "ConnectionStrings__IdentityConnection=Server=identitydb;Database=IdentityDb;User Id=sa;Password=StrongPassword123!;TrustServerCertificate=True;"
      - "Jwt__Key=super_secure_secret_key_1234567890!@#"
      - "Jwt__Issuer=ecommerce.identity"
      - "Jwt__Audience=ecommerce.clients"
      - "Jwt__DurationInMinutes=60"
      - "ElasticConfiguration__Uri=http://elasticsearch:9200" 
    depends_on:
      - identitydb          
    ports: 
      - "8005:8080"
 
  elasticsearch:
    container_name: elasticsearch
    environment:
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  kibana:
    container_name: kibana
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
  
